<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamified eLearning Proof of Concept</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    padding:20px;
    background:#f4f6f8;
}

.container{
    max-width:1400px;
    margin:auto;
    display:flex;
    gap:25px;
    align-items:flex-start;
}

/* LEFT SIDE */

.course-column{
    flex:3;
}

.course-header{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.course-header input{
    padding:10px;
    width:250px;
}

.course-header button{
    padding:10px 18px;
    cursor:pointer;
}

.question{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.question button{
    margin-right:10px;
    margin-bottom:10px;
    padding:10px 15px;

    background:#007bff;
    color:white;
    border:none;
    border-radius:6px;

    cursor:pointer;

    transition:background .2s ease;
}

.question button:hover{
    background:#0056b3;
}

.feedback{
    margin-top:12px;
    padding:12px;
    border-radius:6px;
}

.correct{
    background:#d4edda;
    color:#155724;
}

.incorrect{
    background:#f8d7da;
    color:#721c24;
}

/* RIGHT SIDE */

.sidebar{
    flex:1;
    min-width:320px;

    position:sticky;
    top:20px;

    background:white;
    border-radius:12px;
    padding:20px;

    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.sidebar h2{
    margin-top:0;
}

.progress-container{
    width:100%;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    height:30px;
    margin-bottom:20px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#28a745;
    color:white;
    font-weight:bold;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:.4s;
}

.stats{
    margin-bottom:25px;
}

.stats div{
    margin-bottom:10px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#efefef;
}

.highlight{
    background:#fff3cd;
    font-weight:bold;
}

.completed{
    background:#d1ecf1;
    color:#0c5460;
    padding:20px;
    border-radius:10px;
    font-weight:bold;
}

.rank-up{
    animation:rankFlash .7s;
}

@keyframes rankFlash{
    0% {transform:scale(1);}
    50% {transform:scale(1.04);}
    100% {transform:scale(1);}
}

/* MOBILE */

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        position:relative;
        top:auto;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- MAIN COURSE -->

    <div class="course-column">

        <div class="course-header">

            <h1>Gamified eLearning Demo</h1>

            <label>
                First Name:
                <input
                    type="text"
                    id="learnerName"
                    placeholder="Enter first name">
            </label>

            <button onclick="registerLearner()">
                Join Leaderboard
            </button>

            <p>
                Learner:
                <strong id="learnerDisplay">
                    Not Entered
                </strong>
            </p>

        </div>

        <!-- QUESTION 1 -->

        <div class="question" id="q1">

            <h3>Question 1</h3>

            <p>
                Which planet is known as the Red Planet?
            </p>

            <button onclick="answerQuestion(1,true)">
                Mars
            </button>

            <button onclick="answerQuestion(1,false)">
                Venus
            </button>

            <div id="feedback1"></div>

        </div>

        <!-- QUESTION 2 -->

        <div class="question" id="q2">

            <h3>Question 2</h3>

            <p>
                What is 5 + 7?
            </p>

            <button onclick="answerQuestion(2,true)">
                12
            </button>

            <button onclick="answerQuestion(2,false)">
                13
            </button>

            <div id="feedback2"></div>

        </div>

        <!-- QUESTION 3 -->

        <div class="question" id="q3">

            <h3>Question 3</h3>

            <p>
                Which animal is a mammal?
            </p>

            <button onclick="answerQuestion(3,true)">
                Dolphin
            </button>

            <button onclick="answerQuestion(3,false)">
                Shark
            </button>

            <div id="feedback3"></div>

        </div>

        <!-- QUESTION 4 -->

        <div class="question" id="q4">

            <h3>Question 4</h3>

            <p>
                Which language runs in a web browser?
            </p>

            <button onclick="answerQuestion(4,true)">
                JavaScript
            </button>

            <button onclick="answerQuestion(4,false)">
                SQL
            </button>

            <div id="feedback4"></div>

        </div>

        <div id="completionMessage"></div>

    </div>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>Your Progress</h2>

        <div class="progress-container">

            <div
                id="progressBar"
                class="progress-bar">

                0%

            </div>

        </div>

        <div class="stats">

            <div>
                Score:
                <span id="score">0</span>/4
            </div>

            <div>
                Completed:
                <span id="completed">0</span>/4
            </div>

        </div>

        <h2>Live Leaderboard</h2>

        <table>

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Points</th>
                </tr>
            </thead>

            <tbody id="leaderboardBody"></tbody>

        </table>

    </aside>

</div>

<script>

let learner = "";
let score = 0;
let completedQuestions = 0;
let previousRank = null;

const leaderboard = [
    {name:"Alex",score:4},
    {name:"Taylor",score:3},
    {name:"Jordan",score:2},
    {name:"Morgan",score:1},
    {name:"Casey",score:0}
];

updateLeaderboard();

function registerLearner(){

    const name =
        document.getElementById("learnerName")
        .value.trim();

    if(!name){
        alert("Please enter your first name.");
        return;
    }

    learner = name;

    document.getElementById(
        "learnerDisplay"
    ).textContent = learner;

    const exists =
        leaderboard.find(
            p => p.name === learner
        );

    if(!exists){

        leaderboard.push({
            name: learner,
            score: 0
        });

    }

    updateLeaderboard();
}

function answerQuestion(questionNumber,isCorrect){

    if(!learner){

        alert(
            "Please enter your name first."
        );

        return;
    }

    const question =
        document.getElementById(
            `q${questionNumber}`
        );

    if(question.dataset.answered==="true"){
        return;
    }

    question.dataset.answered="true";

    disableButtons(question);

    completedQuestions++;

    const feedback =
        document.getElementById(
            `feedback${questionNumber}`
        );

    if(isCorrect){

        score++;

        feedback.innerHTML = `
            <div class="feedback correct">
                ✔ Correct! Excellent choice.
                You earned 1 point.
            </div>
        `;

    }else{

        feedback.innerHTML = `
            <div class="feedback incorrect">
                ✖ Incorrect.
                No point awarded for this question.
            </div>
        `;
    }

    updateProgress();
    updateLeaderboard();

    if(completedQuestions === 4){

        document.getElementById(
            "completionMessage"
        ).innerHTML = `
            <div class="completed">
                🎉 Congratulations ${learner}!
                You completed the course with
                a score of ${score}/4.
            </div>
        `;
    }
}

function disableButtons(question){

    const buttons =
        question.querySelectorAll("button");

    buttons.forEach(button=>{

        button.disabled = true;

        button.style.opacity = .6;
        button.style.cursor = "default";

    });
}

function updateProgress(){

    document.getElementById(
        "score"
    ).textContent = score;

    document.getElementById(
        "completed"
    ).textContent = completedQuestions;

    const percentage =
        Math.round(
            (completedQuestions / 4) * 100
        );

    const progressBar =
        document.getElementById(
            "progressBar"
        );

    progressBar.style.width =
        percentage + "%";

    progressBar.textContent =
        percentage + "%";
}

function updateLeaderboard(){

    const learnerRecord =
        leaderboard.find(
            p => p.name === learner
        );

    if(learnerRecord){
        learnerRecord.score = score;
    }

    leaderboard.sort(
        (a,b) => b.score - a.score
    );

    const currentRank =
        leaderboard.findIndex(
            p => p.name === learner
        ) + 1;

    const body =
        document.getElementById(
            "leaderboardBody"
        );

    body.innerHTML = "";

    leaderboard.forEach((person,index)=>{

        const row =
            document.createElement("tr");

        if(person.name === learner){

            row.classList.add(
                "highlight"
            );

            if(
                previousRank &&
                currentRank < previousRank
            ){
                row.classList.add(
                    "rank-up"
                );
            }
        }

        row.innerHTML = `
            <td>${index+1}</td>
            <td>${person.name}</td>
            <td>${person.score}</td>
        `;

        body.appendChild(row);

    });

    previousRank = currentRank;
}

</script>

</body>
</html>
